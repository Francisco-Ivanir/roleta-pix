<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin - Roleta PIX</title>

<link rel="stylesheet" href="../css/admin.css">

</head>


<body>


<h1>
Painel Admin
</h1>


<div class="cards">


<div class="card">

<h3>
Total de giros
</h3>

<p id="totalGiros">
0
</p>

</div>



<div class="card">

<h3>
Pendentes
</h3>

<p id="pendentes">
0
</p>

</div>



<div class="card">

<h3>
Finalizados
</h3>

<p id="finalizados">
0
</p>

</div>



<div class="card">

<h3>
Arrecadado
</h3>

<p id="arrecadado">
R$ 0,00
</p>

</div>


</div>

<h2>
Prêmios Distribuídos
</h2>

<div id="estatisticasPremios">

</div

  <div style="margin-bottom:15px;">

<button id="btnNovoPremio">

+ Novo Prêmio

</button>

</div>
  
  <h2>
Gerenciar Prêmios
</h2>

<table>

<thead>

<tr>

<th>
Nome
</th>

<th>
Peso
</th>

<th>
Ativo
</th>

  <th>
Ações
</th>
  
</tr>

</thead>

<tbody id="listaPremios">

</tbody>

</table>
  
<h2>
Últimos giros
</h2>


<table>

<thead>

<tr>

<th>
Data/Hora
</th>

<th>
Cliente
</th>

<th>
WhatsApp
</th>

<th>
Prêmio
</th>

<th>
Status
</th>

</tr>

</thead>


<tbody id="listaPagamentos">


</tbody>


</table>



<script type="module" src="../js/admin.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
  eruda.init();
</script>

  <div id="modalPremio" class="modal">

<div class="modal-box">

<h2>Editar Prêmio</h2>

<label>Nome</label>

<input
id="editNomePremio"
type="text">

<label>Peso</label>

<input
id="editPesoPremio"
type="number">

<label>

<input
id="editAtivoPremio"
type="checkbox">

Ativo

</label>

<div class="botoesModal">

<button id="btnSalvarPremio">

Salvar

</button>

<button id="btnFecharPremio">

Cancelar

</button>

</div>

</div>

</div>
  
</body>

</html>
