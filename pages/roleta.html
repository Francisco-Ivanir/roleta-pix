<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giro Premiado</title>

  <link rel="stylesheet" href="../css/roleta.css">
</head>
<body>

<div class="container">

  <h1>🎉 GIRO PREMIADO 🎉</h1>

  <p class="boas-vindas">
    Olá, Participante!
  </p>

  <p class="giros">
    Giros disponíveis: <strong>1</strong>
  </p>

  <div class="roleta-area">

    <div class="ponteiro">▼</div>

    <canvas id="roleta" width="320" height="320"></canvas>

  </div>

  <button id="btnGirar">
    GIRAR
  </button>

  <button id="btnLiberar">
Liberar Giro (Teste)
</button>
  
  <p id="resultado">
    Aguardando seu giro...
  </p>

</div>

<script type="module" src="../js/roleta.js"></script>

  <div id="modalPix" class="modalPix">

  <div class="caixaPix">

    <h2>Pagamento PIX</h2>

    <p>Valor do giro:</p>

    <h3>R$ 1,00</h3>

    <p>Chave PIX:</p>

    <strong id="chavePix">
      CHAVE_TESTE_AQUI
    </strong>


    <br><br>

    <button id="btnJaPaguei">
      Já paguei
    </button>


    <button id="btnFecharPix">
      Fechar
    </button>


  </div>

</div>
  
</body>
</html>
