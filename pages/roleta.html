<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giro Premiado</title>

  <link rel="stylesheet" href="../css/roleta.css">
</head>
<body>

<div class="container">

  <h1>🎉 GIRO PREMIADO 🎉</h1>

  <p class="boas-vindas">
    Olá, Participante!
  </p>

  <p class="giros">
    Giros disponíveis: <strong>1</strong>
  </p>

  <div class="roleta-area">

    <div class="ponteiro">▼</div>

    <canvas id="roleta" width="320" height="320"></canvas>

  </div>

  <button id="btnGirar">
    GIRAR
  </button>

  <button id="btnLiberar">
Liberar Giro (Teste)
</button>
  
  <p id="resultado">
    Aguardando seu giro...
  </p>

</div>

<script type="module" src="../js/roleta.js"></script>
  
<script type="module" src="../js/cliente.js"></script>
  
  <div id="modalCliente" class="modalPix">

  <div class="caixaPix">

    <h2>🎯 Identificação</h2>

    <p>Nome (opcional)</p>

    <input 
    id="nomeCliente"
    type="text"
    placeholder="Seu nome">


    <p>WhatsApp *</p>

    <input 
    id="whatsappCliente"
    type="text"
    placeholder="(11) 99999-9999">


    <br><br>

    <button id="btnContinuarCliente">
      Continuar
    </button>


    <button id="btnFecharCliente">
      Fechar
    </button>


  </div>

</div>
  
 <div id="modalPix" class="modalPix">

  <div class="caixaPix">

    <h2>🎯 Liberar Giro</h2>

    <p>Faça o pagamento PIX para liberar 1 giro.</p>


    <h3 id="valorPix">
      R$ 1,00
    </h3>


    <img 
    id="qrPix"
    src="../img/qr-teste.png"
    width="180"
    >


    <p>Chave PIX:</p>


    <div class="areaChave">

      <span id="chavePix">
        CHAVE_TESTE_AQUI
      </span>

      <button id="btnCopiarPix">
        Copiar
      </button>

    </div>


    <p class="avisoPix">
      Após pagar, clique em "Já paguei".
    </p>


    <button id="btnJaPaguei">
      Já paguei
    </button>


    <button id="btnFecharPix">
      Fechar
    </button>


  </div>

</div>
  
</body>
</html>
